    <p>Loading gallery...</p>

<script>
    async function loadGallery() {
        const gallery = document.getElementById('photo-gallery');
        
        try {
            const response = await fetch('/api/photos');
            const photos = await response.json();

            gallery.innerHTML = ''; //removes loading text

            if (photos.length === 0) {
                gallery.innerHTML = '<p>No photos found in the database.</p>';
                return;
            }

            photos.forEach(photo => {
                const card = document.createElement('div');
                card.className = 'card';
                
                // Only renders the image from the database FilePath
                card.innerHTML = `
                    <img src="${photo.FilePath}" alt="Photography Portfolio Image">
                `;
                gallery.appendChild(card);
            });
        } catch (err) {
            console.error("Error loading gallery:", err);
            gallery.innerHTML = "<p>Error: Could not connect to the database.</p>";
        }
    }

    // Load photos automatically when the page opens
    window.onload = loadGallery;
</script>
