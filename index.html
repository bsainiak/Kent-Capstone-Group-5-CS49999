<main class="gallery" id="photo-gallery">
    <p>Loading gallery...</p>
</main>



<script>
    const searchInput = document.getElementById('search-input');
    const gallery = document.getElementById('photo-gallery');

    //waits for the enter key to make any changes
    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const term = searchInput.value.trim();
            loadGallery(term); 
        }
    });

    async function loadGallery(search = '') {

            if (search.toLowerCase() === 'all') {
                search = '';
            }

            try {
                gallery.innerHTML = '<p>Searching...</p>';
                
                //encodes the search portion to the url
                const url = search 
                    ? `/api/photos?search=${encodeURIComponent(search)}` 
                    : '/api/photos';

                //fetch calls the backend while the json is an array of photos that can easily be looped through
                const response = await fetch(url);
                const photos = await response.json();

                gallery.innerHTML = ''; 

                if (photos.length === 0) {
                    //if nothing in the database matches the tag it returns no result and an error
                    gallery.innerHTML = `<p class="no-results">No photos found for "${search}".</p>`;
                    return;
                }

                photos.forEach(photo => {
                    //for every photo in the json created by the search and fetch
                    //creates a new html div tag for each of the photos
                    const card = document.createElement('div');
                    card.className = 'card';
        
                    card.innerHTML = `
                        <img src="${photo.FilePath}" 
                        alt="Gallery Image" 
                        onerror="this.closest('.card').remove();">
                    `;
                    gallery.appendChild(card);
                });
            
            } catch (err) {
                console.error("Error loading gallery:", err);
                gallery.innerHTML = "<p>Error: Could not update the gallery.</p>";
            }
        }

    // Load everything when the page first opens
    window.onload = () => loadGallery();
</script>


</div>

<script>
    //Photo route
    const mockPhotoPath = "images/_DSC5696.jpg";

    downloadBtn.href = mockPhotoPath;
